# Adaptive LQR Controller — tuning config

adaptive_lqr_controller_node:
  ros__parameters:

    # --- Vehicle ---
    wheelbase: 0.33       # [m] distance between axles
    dt: 0.005              # [s] control timestep (should match control_hz)

    # --- Speed limits ---
    max_acceleration: 2.5
    max_steering_angle: 1.2          # [rad] hard steering limit
    min_speed: 0.7        
    max_speed: 1.5       

    # --- LQR base weights (adaptation scales) ---
    adaptive.base_position_weight: 3.0
    adaptive.base_velocity_weight: 2.3
    adaptive.base_heading_weight: 6.4
    adaptive.base_acceleration_weight: 0.3
    adaptive.base_steering_weight: 4.3

    # --- Adaptation factors (how strongly each signal shifts the weights) ---
    adaptive.velocity_adaptation_factor: 0.5        # velocity influence on weight scaling
    adaptive.curvature_adaptation_factor: 3.0       # curvature influence on weight scaling
    adaptive.error_adaptation_factor: 1.5           # tracking error influence
    adaptive.performance_adaptation_factor: 0.3     # performance history influence

    # --- Adaptation bounds ---
    adaptive.min_weight_multiplier: 0.2
    adaptive.max_weight_multiplier: 5.0
    adaptive.adaptation_rate: 0.1               # EMA rate for weight updates (0–1)

    # --- Speed regime thresholds (used to select adaptation behaviour) ---
    adaptive.high_speed_threshold: 8.0              # [m/s] above this: tighter position tracking
    adaptive.low_speed_threshold: 1.2               # [m/s] below this: more aggressive control
    adaptive.high_curvature_threshold: 1.5          # curvature value treated as "sharp corner"
    adaptive.moderate_curvature_threshold: 0.5      # curvature value treated as "mild bend"

    # --- Safety monitor (set enable_safety_monitor: true to activate) ---
    safety.enable_safety_monitor: false
    safety.min_obstacle_distance: 0.3               # [m] begin safety deceleration below this
    safety.emergency_brake_distance: 0.3            # [m] trigger emergency stop below this
    safety.collision_check_angle: 45.0              # [deg] lidar sector checked ahead of the car
    safety.max_lateral_acceleration: 3.0            # [m/s²] wobble threshold
    safety.max_angular_velocity: 2.0                # [rad/s] wobble threshold
    safety.wobble_time_threshold: 0.8               # [s] sustained oscillation before intervention
    safety.steering_oscillation_threshold: 0.4      # [rad] steering oscillation amplitude limit
    safety.safety_decel_rate: 1.8                   # [m/s²] deceleration for soft safety events
    safety.emergency_decel_rate: 6.0                # [m/s²] deceleration for emergency stop
    safety.min_safe_speed: 1.4                      # [m/s] floor speed in safety deceleration mode

    # --- Control loop ---
    control_hz: 200.0
    lookahead_distance: 1.3           # [m] nominal lookahead distance
    enable_feedforward: true          
    speed_ramp_rate: 1.2              # [m/s/s] max rate of change of the speed command

    # --- Steering rate limiter (anti-wobble) ---
    enable_steering_rate_limit: true
    max_steering_rate: 1.2            # [rad/s] maximum steering angle rate of change

    # --- Curve speed reduction ---
    enable_curve_detection: true
    curve_lookahead_points: 8         # trajectory points scanned ahead to estimate curvature
    max_curvature_threshold: 1.0      # curvature above 0.5x this triggers speed reduction
    curve_speed_factor: 0.7           # speed multiplier when a sharp curve is detected

    # --- Solve-timeout safety gate (independent of safety monitor) ---
    enable_safety_checks: false       # stop if no successful solve for safety_timeout seconds
    safety_timeout: 1.0               # [s] max allowed gap between successful solves
    emergency_brake_threshold: 1.4   # [m/s²] deceleration used in all emergency stop commands

    # --- Topics ---
    odom_topic: "/odom"
    reference_topic: "/horizon_mapper/reference_trajectory"
    status_topic: "/horizon_mapper/path_ready"
    control_topic: "/lqr/drive"
    pose_estimate_topic: "/initialpose"
    lidar_topic: "/scan"

    # --- Logging ---
    qos_depth: 10
    debug: false              # enable verbose per-step debug logs
    log_frequency_divider: 10 # print research-format step log every N control cycles
