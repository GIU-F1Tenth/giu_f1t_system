planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    use_sim_time: false

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: true             # Downsample map for faster planning
      downsampling_factor: 2               # 2x resolution (e.g., 0.05m -> 0.1m)
      tolerance: 0.3                       # Slightly increased goal tolerance
      allow_unknown: false                 # Assume known map for high-speed racing
      max_iterations: 1000                # Reasonable cap for racing maps
      max_on_approach_iterations: 500
      max_planning_time: 0.002               # Lower time budget to force quicker plans
      motion_planner_servermodel_for_search: "DUBIN"
      angle_quantization_bins: 48          # Reduce bins (was 72) for faster expansion
      analytic_expansion_ratio: 2.0        # Less frequent analytic expansion
      analytic_expansion_max_length: 2.5
      analytic_expansion_max_cost: 250.0   # Slightly more tolerant
      analytic_expansion_max_cost_override: true
      minimum_turning_radius: 0.40         # For F1TENTH car geometry
      reverse_penalty: 3.0                 # Avoid reversing in racing context
      change_penalty: 0.0
      non_straight_penalty: 1.1            # Allow some curvature
      cost_penalty: 2.5                    # Stay away from obstacles
      retrospective_penalty: 0.01
      lookup_table_size: 10.0              # Smaller cache to save memory
      cache_obstacle_heuristic: true       # Cache results for faster replans
      debug_visualizations: false
      use_quadratic_cost_penalty: false
      downsample_obstacle_heuristic: true
      allow_primitive_interpolation: false
      coarse_search_resolution: 6          # Coarser search speeds up pathfinding
      goal_heading_mode: 1   # Best for dynamic goal angles
      smooth_path: true

      smoother:
        max_iterations: 500                # Reduced iterations for faster smoothing
        w_smooth: 0.3
        w_data: 0.15                       # Favor smoother curves
        tolerance: 1.0e-6
        do_refinement: true
        refinement_num: 1                 # Less post-processing for speed

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0  # faster updates for real-time obstacle handling
      publish_frequency: 5.0  # higher publish rate for local planner visibility
      global_frame: odom
      robot_base_frame: base_link  # changed to base_link (standard), not laser
      use_sim_time: False
      rolling_window: true
      width: 2.0  # narrower map for less computation
      height: 2.0
      resolution: 0.05  # fine enough for tight maneuvering
      robot_radius: 0.15  # accurate model size
      always_send_full_costmap: False  # reduces computation/load

      plugins: ["obstacle_layer", "inflation_layer"]

      # Obstacle layer (using laser scan directly)
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.1
          obstacle_max_range: 2.0
          obstacle_min_range: 0.1
        observation_persistence: 5.0  # seconds before old data is removed

      # Inflation layer with tight, responsive safety margins
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.5  # smoother inflation (less steep decay)
        inflation_radius: 0.6  # safety buffer: just above car width

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0  # slightly faster than default (0.5)
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.15
      resolution: 0.05
      track_unknown_space: false  # avoid unknown space inflation
      always_send_full_costmap: False

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.1
          obstacle_max_range: 2.0
          obstacle_min_range: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.5
        inflation_radius: 0.6  # slightly higher for longer-range planning


robot_state_publisher:
  ros__parameters:
    use_sim_time: False