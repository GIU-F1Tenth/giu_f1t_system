/**:
  ros__parameters:

    use_sim_time: false

    planner_server:
      ros__parameters:
        expected_planner_frequency: 20.0
        planner_plugins: ["SmacPlannerHybrid"]
        SmacPlannerHybrid:
          plugin: "nav2_smac_planner/SmacPlannerHybrid"

          # Hybrid A* search configuration
          tolerance: 0.25
          downsample_costmap: false
          downsampling_factor: 1
          allow_unknown: false
          max_iterations: 10000
          max_on_approach_iterations: 1000
          max_planning_time: 0.5  # seconds
          motion_model_for_search: "DUBIN"
          angle_quantization_bins: 72
          analytic_expansion_ratio: 3.5
          lookup_table_size: 20.0  # meters
          minimum_turning_radius: 1.0  # meters (adjust for F1TENTH car)
          reverse_penalty: 2.0
          change_penalty: 0.1
          non_straight_penalty: 1.5
          cost_penalty: 0.015
          rotation_penalty: 0.1
          debug_visualizations: false

          # Path smoothing
          smooth_path: true
          smoother:
            max_iterations: 1000
            w_smooth: 0.3
            w_data: 0.2
            tolerance: 1.0e-10

    global_costmap:
      ros__parameters:
        global_frame: "map"
        robot_base_frame: "base_link"
        update_frequency: 5.0
        publish_frequency: 2.0
        rolling_window: false
        resolution: 0.05
        width: 20.0
        height: 20.0
        origin_x: -10.0
        origin_y: -10.0
        robot_radius: 0.25
        track_unknown_space: true
        always_send_full_costmap: true

        plugins: ["obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: true
          observation_sources: scan
          scan:
            topic: /scan
            max_obstacle_height: 2.0
            clearing: true
            marking: true
            data_type: "LaserScan"
            obstacle_range: 3.0
            raytrace_range: 3.5

        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          enabled: true
          inflation_radius: 0.3
          cost_scaling_factor: 3.0

    local_costmap:
      ros__parameters:
        global_frame: "odom"
        robot_base_frame: "base_link"
        update_frequency: 10.0
        publish_frequency: 5.0
        rolling_window: true
        resolution: 0.05
        width: 5.0
        height: 5.0
        robot_radius: 0.25
        track_unknown_space: false
        always_send_full_costmap: true

        plugins: ["obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: true
          observation_sources: scan
          scan:
            topic: /scan
            max_obstacle_height: 2.0
            clearing: true
            marking: true
            data_type: "LaserScan"
            obstacle_range: 3.0
            raytrace_range: 3.5

        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          enabled: true
          inflation_radius: 0.25
          cost_scaling_factor: 3.0
