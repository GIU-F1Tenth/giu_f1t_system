mcl_particle_filter_node:
  ros__parameters:
    angle_step: 9
    max_particles: 1050
    max_viz_particles: 60
    squash_factor: 2.2
    max_range: 10.0
    theta_discretization: 112
    range_method: "cddt"
    rangelib_variant: 3
    fine_timing: false
    publish_odom: true
    viz: true
    z_short: 0.01
    z_max: 0.07
    z_rand: 0.12
    z_hit: 0.75
    sigma_hit: 8.0
    motion_dispersion_x: 0.01
    motion_dispersion_y: 0.005
    motion_dispersion_theta: 0.01
    scan_topic: "/scan"
    odometry_topic: "/odom"
    static_map: "map_server/map"
